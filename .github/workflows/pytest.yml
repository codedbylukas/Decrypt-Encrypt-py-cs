name: Pytest Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    # Der Runner nutzt nun die Betriebssysteme aus der Matrix
    runs-on: ${{ matrix.os }}
    
    strategy:
      # Verhindert, dass alle anderen Jobs abgebrochen werden, falls einer fehlschlägt
      fail-fast: false 
      matrix:
        # Hier definieren wir die Betriebssysteme (Linux, Windows, macOS)
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        python-version: ["3.10", "3.12", "3.14", "3.16", "3.18", "3.20", "3.22", "3.24"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-node@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Unit Tests
        run: pytest -v
      
